<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Codebay</title>
		<style>
			/* Each themed variable is defined once as light-dark(light, dark). With no
	       data-theme attribute (the "auto" mode) `color-scheme: light dark` lets the
	       browser preference pick the value; an explicit choice pins color-scheme
	       below, which forces every light-dark() to that side. */
			:root {
				color-scheme: light dark;
				--bg: light-dark(#d7d8d2, #1b1c15);
				--bg-card: light-dark(#e7e8e2, #24261c);
				--ink: light-dark(#14150f, #e8e9df);
				--ink-soft: light-dark(#45463e, #b7b8a9);
				--ink-faint: light-dark(#7d7e74, #85867a);
				--rule: light-dark(#20211a, #46473a);
				--rule-soft: light-dark(#b9bab2, #34352a);
				--warn-bg: light-dark(#e4d98f, #4a3d12);
				--warn-line: light-dark(#9c8729, #c9a83a);
				--warn-ink: light-dark(#463b08, #f3e3a0);
				--ok-bg: light-dark(#8fbf6e, #23421a);
				--ok-line: light-dark(#4c7a2e, #6fa84a);
				--ok-ink: light-dark(#1c3110, #cdeab8);
				--danger: light-dark(#b23a2e, #e2564a);
				--danger-soft: light-dark(#e3c6c1, #4a231e);
				--screen-bg: #0d0e0a;
				--screen-ink: #d8d9cf;
				--screen-line: rgba(255, 255, 255, 0.04);
				--attn-done: #22c55e;
				--attn-waiting: #f59e0b;
				--info: #388bfd;
				--grid-line: light-dark(rgba(0, 0, 0, 0.035), rgba(255, 255, 255, 0.035));
				/* --attn-done at reduced opacity — reads correctly on both themes' track color. */
				--switch-on-bg: rgba(34, 197, 94, 0.32);
				--font-display: 'Doto Variable', 'JetBrains Mono Variable', monospace;
				--font-mono:
					'JetBrains Mono Variable', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
				--font-serif: var(--font-display);
				--font-sans: var(--font-mono);
			}
			:root[data-theme='light'] {
				color-scheme: light;
			}
			:root[data-theme='dark'] {
				color-scheme: dark;
			}
			* {
				box-sizing: border-box;
			}
			/* The whole theme is square — enforce it globally (covers third-party
         widgets like the toaster too). Intentional, not a workaround.
         Exclude Mochi's dev-only debug bar so it keeps its own styling. */
			*:not(#mochi-dev-toolbar):not(#mochi-dev-toolbar *) {
				border-radius: 0 !important;
			}
			/* Shared "panel" chrome — the bordered, drop-shadowed card look used
         throughout the app (health box, ports/log boxes, instance cards,
         dropdowns, modals, the UI showcase). A component can still override
         `box-shadow`/`border` locally (e.g. the folder-picker modal's bigger
         8px shadow) — Svelte's auto-scoping class gives any same-component
         rule higher specificity than this global one, so local overrides
         always win regardless of source order. */
			.panel {
				border: 1px solid var(--ink);
				box-shadow: 4px 4px 0 var(--ink);
			}
			/* Shared dark header bar — the inverted label strip at the top of a panel. */
			.panel-bar {
				padding: 9px 14px;
				background: var(--ink);
				color: var(--bg);
				font-family: var(--font-display);
				font-weight: 700;
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 0.12em;
			}
			body {
				margin: 0;
				font-family: var(--font-sans);
				/* Pale LCD panel with a faint pixel-grid matrix overlay. */
				background:
					repeating-linear-gradient(0deg, var(--grid-line) 0 1px, transparent 1px 3px),
					repeating-linear-gradient(90deg, var(--grid-line) 0 1px, transparent 1px 3px), var(--bg);
				color: var(--ink);
				font-size: 14px;
				line-height: 1.55;
				min-height: 100vh;
				-webkit-font-smoothing: antialiased;
			}
		</style>
		{{mochi.head}} {{mochi.css}}
	</head>
	<body>
		{{mochi.body}} {{mochi.script}}
	</body>
</html>
