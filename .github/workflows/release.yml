name: release

on:
  push:
    branches: [main]
  # Re-publish an existing tag (e.g. the npm publish step failed after the
  # GitHub release was already cut).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to re-publish (e.g. v0.2.0)'
        required: true
        type: string

# Never run two releases at once, and never cancel one midway — a half-published
# release is worse than a slow one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance (OIDC)

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Opens/updates the release PR; on merge it cuts the tag + GitHub release
      # and sets release_created, which gates the publish job below.
      # NOTE: needs "Allow GitHub Actions to create and approve pull requests"
      # (Settings → Actions → General), otherwise this fails at PR creation.
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please only rewrites package.json/CHANGELOG, so bun.lock can drift
      # if a dependency edit landed alongside. Re-resolve on the PR branch and
      # commit the result so the tag we publish from installs with --frozen-lockfile.
      - name: Check out release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' || steps.release.outputs.prs_updated == 'true' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJson(steps.release.outputs.prs)[0].headBranchName }}

      - name: Set up Bun
        if: ${{ steps.release.outputs.prs_created == 'true' || steps.release.outputs.prs_updated == 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Sync bun.lock
        if: ${{ steps.release.outputs.prs_created == 'true' || steps.release.outputs.prs_updated == 'true' }}
        run: |
          bun install
          if ! git diff --quiet bun.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bun.lock
            git commit -m "chore: sync bun.lock"
            git push origin HEAD:${{ fromJson(steps.release.outputs.prs)[0].headBranchName }}
          fi

  # Publishes the tag release-please just cut, or the tag given to
  # workflow_dispatch. Always builds from the tag, never from a moving branch.
  publish:
    needs: release-please
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      # npm (not bun) does the publishing: it's the only one that can attach a
      # provenance attestation. registry-url wires NODE_AUTH_TOKEN into ~/.npmrc.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - run: bun run typecheck
      - run: bun run test

      # The tarball ships the production build: in production Mochi serves static
      # assets (the chime WAVs) only from the prebuilt manifest, and this step also
      # runs scripts/portable-manifest.ts, without which the shipped manifest points
      # at absolute paths that only exist on this runner.
      - run: bun run build

      - name: Verify the tarball is self-contained
        run: bun scripts/verify-package.ts

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
